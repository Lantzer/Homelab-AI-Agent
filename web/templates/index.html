<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Homelab AI Agent</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 2rem;
      color: #7dd3fc;
    }

    .container {
      width: 100%;
      max-width: 720px;
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    .card {
      background: #1e2130;
      border: 1px solid #2d3148;
      border-radius: 10px;
      padding: 1.5rem;
    }

    .card h2 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 1rem;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* Chat */
    #chat-log {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      max-height: 400px;
      overflow-y: auto;
      margin-bottom: 1rem;
      padding-right: 0.25rem;
    }

    .message {
      padding: 0.6rem 0.9rem;
      border-radius: 8px;
      line-height: 1.5;
      font-size: 0.925rem;
      max-width: 90%;
      white-space: pre-wrap;
    }

    .message.user {
      background: #1d4ed8;
      align-self: flex-end;
    }

    .message.agent {
      background: #1e293b;
      border: 1px solid #334155;
      align-self: flex-start;
    }

    .message.error {
      background: #3b1a1a;
      border: 1px solid #7f1d1d;
      color: #fca5a5;
      align-self: flex-start;
    }

    .input-row {
      display: flex;
      gap: 0.5rem;
    }

    input[type="text"] {
      flex: 1;
      background: #0f1117;
      border: 1px solid #2d3148;
      color: #e2e8f0;
      border-radius: 6px;
      padding: 0.55rem 0.8rem;
      font-size: 0.925rem;
      outline: none;
    }

    input[type="text"]:focus {
      border-color: #7dd3fc;
    }

    select {
      background: #0f1117;
      border: 1px solid #2d3148;
      color: #e2e8f0;
      border-radius: 6px;
      padding: 0.55rem 0.7rem;
      font-size: 0.875rem;
      outline: none;
      cursor: pointer;
    }

    select:focus { border-color: #7dd3fc; }

    button {
      background: #1d4ed8;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 0.55rem 1.1rem;
      font-size: 0.925rem;
      cursor: pointer;
      transition: background 0.15s;
    }

    button:hover { background: #2563eb; }
    button:disabled { background: #334155; cursor: not-allowed; }

    /* Tool badges */
    .tool-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 0.3rem;
      margin-bottom: 0.4rem;
    }

    .tool-badge {
      display: inline-block;
      font-size: 0.7rem;
      padding: 0.15rem 0.5rem;
      border-radius: 4px;
      font-weight: 600;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .badge-homelab_rag    { background: #1e3a5f; color: #7dd3fc; }
    .badge-supporting_rag { background: #1a3a2a; color: #86efac; }
    .badge-web_search     { background: #3b2a1a; color: #fbbf24; }
    .badge-command        { background: #2a1a3b; color: #c4b5fd; }

    /* Command blocks */
    .command-block {
      background: #0a0c12;
      border: 1px solid #4c1d95;
      border-radius: 6px;
      padding: 0.55rem 0.8rem;
      margin-top: 0.5rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .command-block code {
      font-family: "Cascadia Code", "Fira Code", "Consolas", monospace;
      font-size: 0.875rem;
      color: #c4b5fd;
      flex: 1;
      word-break: break-all;
    }

    .copy-btn {
      background: #4c1d95;
      font-size: 0.75rem;
      padding: 0.3rem 0.65rem;
      flex-shrink: 0;
      border-radius: 5px;
    }

    .copy-btn:hover { background: #6d28d9; }

    .command-reasoning {
      font-size: 0.8rem;
      color: #7c6faa;
      margin-top: 0.25rem;
      font-style: italic;
    }

    /* Ingest */
    .ingest-row {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
    }

    #ingest-status {
      font-size: 0.875rem;
      min-height: 1.25rem;
    }

    #ingest-status.success { color: #86efac; }
    #ingest-status.error   { color: #fca5a5; }

    /* Sources */
    .sources-tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
    }

    .tab-btn {
      font-size: 0.8rem;
      padding: 0.35rem 0.8rem;
      background: #0f1117;
      border: 1px solid #2d3148;
      color: #94a3b8;
    }

    .tab-btn.active {
      background: #1d4ed8;
      border-color: #1d4ed8;
      color: white;
    }

    .tab-btn:hover:not(.active) { background: #1e2130; }

    #sources-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    #sources-list li {
      font-size: 0.875rem;
      color: #94a3b8;
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 6px;
      padding: 0.4rem 0.75rem;
      word-break: break-all;
    }

    #sources-empty {
      font-size: 0.875rem;
      color: #475569;
      margin-top: 0.75rem;
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    .card-header h2 { margin-bottom: 0; }

    button.danger {
      background: #7f1d1d;
      font-size: 0.8rem;
      padding: 0.4rem 0.8rem;
    }

    button.danger:hover { background: #991b1b; }
  </style>
</head>
<body>
  <h1>Homelab AI Agent</h1>

  <div class="container">

    <!-- Chat -->
    <div class="card">
      <div class="card-header">
        <h2>Ask a Question</h2>
        <button class="danger" onclick="resetChat()">New Conversation</button>
      </div>
      <div id="chat-log"></div>
      <div class="input-row">
        <input id="question-input" type="text" placeholder="Ask about your homelab..." />
        <button id="ask-btn" onclick="askQuestion()">Ask</button>
      </div>
    </div>

    <!-- Ingest -->
    <div class="card">
      <div class="card-header">
        <h2>Add Document</h2>
        <button class="danger" onclick="resetIndex()">Delete Index</button>
      </div>
      <div class="ingest-row">
        <input id="source-input" type="text" placeholder="File path or URL" />
        <select id="collection-select">
          <option value="homelab">Homelab (my docs)</option>
          <option value="supporting">Supporting (manuals/guides)</option>
        </select>
        <button id="ingest-btn" onclick="ingestDocument()">Add</button>
      </div>
      <div id="ingest-status"></div>

      <!-- Sources tabs -->
      <div class="sources-tabs">
        <button class="tab-btn active" id="tab-homelab" onclick="switchTab('homelab')">Homelab Docs</button>
        <button class="tab-btn" id="tab-supporting" onclick="switchTab('supporting')">Supporting Docs</button>
      </div>
      <ul id="sources-list"></ul>
      <p id="sources-empty"></p>
    </div>

  </div>

  <script>
    const chatLog = document.getElementById("chat-log");
    let activeTab = "homelab";

    function appendAgentMessage(data) {
      const wrapper = document.createElement("div");
      wrapper.className = "message agent";

      // Tool badges
      if (data.tools_used && data.tools_used.length > 0) {
        const badgeRow = document.createElement("div");
        badgeRow.className = "tool-badges";
        data.tools_used.forEach(tool => {
          const badge = document.createElement("span");
          badge.className = `tool-badge badge-${tool}`;
          badge.textContent = tool.replace("_", " ");
          badgeRow.appendChild(badge);
        });
        wrapper.appendChild(badgeRow);
      }

      // Answer text
      const answerEl = document.createElement("div");
      answerEl.textContent = data.answer;
      wrapper.appendChild(answerEl);

      // Command blocks
      if (data.commands && data.commands.length > 0) {
        data.commands.forEach(({ command: cmd, reasoning }) => {
          if (!cmd) return;
          const block = document.createElement("div");
          block.className = "command-block";

          const code = document.createElement("code");
          code.textContent = cmd;

          const copyBtn = document.createElement("button");
          copyBtn.className = "copy-btn";
          copyBtn.textContent = "Copy";
          copyBtn.onclick = () => {
            navigator.clipboard.writeText(cmd).then(() => {
              copyBtn.textContent = "Copied!";
              setTimeout(() => { copyBtn.textContent = "Copy"; }, 1500);
            });
          };

          block.appendChild(code);
          block.appendChild(copyBtn);
          wrapper.appendChild(block);

          if (reasoning) {
            const reasonEl = document.createElement("div");
            reasonEl.className = "command-reasoning";
            reasonEl.textContent = reasoning;
            wrapper.appendChild(reasonEl);
          }
        });
      }

      chatLog.appendChild(wrapper);
      chatLog.scrollTop = chatLog.scrollHeight;
    }

    function appendMessage(text, type) {
      const el = document.createElement("div");
      el.className = `message ${type}`;
      el.textContent = text;
      chatLog.appendChild(el);
      chatLog.scrollTop = chatLog.scrollHeight;
    }

    async function askQuestion() {
      const input = document.getElementById("question-input");
      const btn = document.getElementById("ask-btn");
      const question = input.value.trim();
      if (!question) return;

      appendMessage(question, "user");
      input.value = "";
      btn.disabled = true;

      try {
        const res = await fetch("/ask", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question })
        });
        const data = await res.json();
        if (data.error) {
          appendMessage(data.error, "error");
        } else {
          appendAgentMessage(data);
        }
      } catch (e) {
        appendMessage("Failed to reach the server.", "error");
      } finally {
        btn.disabled = false;
        input.focus();
      }
    }

    async function ingestDocument() {
      const input = document.getElementById("source-input");
      const btn = document.getElementById("ingest-btn");
      const status = document.getElementById("ingest-status");
      const collection = document.getElementById("collection-select").value;
      const source = input.value.trim();
      if (!source) return;

      btn.disabled = true;
      status.textContent = "Ingesting...";
      status.className = "";

      try {
        const res = await fetch("/ingest", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ source, collection })
        });
        const data = await res.json();
        if (data.error) {
          status.textContent = data.error;
          status.className = "error";
        } else {
          status.textContent = data.message;
          status.className = data.failed && data.failed.length > 0 ? "error" : "success";
          input.value = "";
          loadSources(activeTab);

          if (data.failed && data.failed.length > 0) {
            const failList = data.failed.map(f => `• ${f.source}: ${f.error}`).join("\n");
            status.textContent += `\n\nFailed:\n${failList}`;
          }
        }
      } catch (e) {
        status.textContent = "Failed to reach the server.";
        status.className = "error";
      } finally {
        btn.disabled = false;
      }
    }

    function switchTab(collection) {
      activeTab = collection;
      document.getElementById("tab-homelab").className =
        "tab-btn" + (collection === "homelab" ? " active" : "");
      document.getElementById("tab-supporting").className =
        "tab-btn" + (collection === "supporting" ? " active" : "");
      loadSources(collection);
    }

    async function loadSources(collection = "homelab") {
      const list = document.getElementById("sources-list");
      const empty = document.getElementById("sources-empty");
      try {
        const res = await fetch(`/sources?collection=${collection}`);
        const data = await res.json();
        list.innerHTML = "";
        if (data.sources.length === 0) {
          empty.textContent = `No documents in ${collection} collection.`;
        } else {
          empty.textContent = "";
          data.sources.forEach(src => {
            const li = document.createElement("li");
            li.textContent = src;
            list.appendChild(li);
          });
        }
      } catch (e) {
        empty.textContent = "Failed to load sources.";
      }
    }

    async function resetChat() {
      if (!confirm("Clear the current conversation?")) return;
      try {
        await fetch("/reset-chat", { method: "POST" });
        document.getElementById("chat-log").innerHTML = "";
      } catch (e) {
        appendMessage("Failed to reset conversation.", "error");
      }
    }

    async function resetIndex() {
      if (!confirm("Delete the entire index (both collections) and start fresh?")) return;
      const status = document.getElementById("ingest-status");
      try {
        const res = await fetch("/reset", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({})
        });
        const data = await res.json();
        if (data.error) {
          status.textContent = data.error;
          status.className = "error";
        } else {
          status.textContent = data.message;
          status.className = "success";
          loadSources(activeTab);
        }
      } catch (e) {
        status.textContent = "Failed to reach the server.";
        status.className = "error";
      }
    }

    document.getElementById("question-input").addEventListener("keydown", e => {
      if (e.key === "Enter") askQuestion();
    });

    document.getElementById("source-input").addEventListener("keydown", e => {
      if (e.key === "Enter") ingestDocument();
    });

    loadSources("homelab");
  </script>
</body>
</html>
