<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Homelab AI Agent</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 2rem;
      color: #7dd3fc;
    }

    .container {
      width: 100%;
      max-width: 720px;
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    .card {
      background: #1e2130;
      border: 1px solid #2d3148;
      border-radius: 10px;
      padding: 1.5rem;
    }

    .card h2 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 1rem;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* Chat */
    #chat-log {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      max-height: 400px;
      overflow-y: auto;
      margin-bottom: 1rem;
      padding-right: 0.25rem;
    }

    .message {
      padding: 0.6rem 0.9rem;
      border-radius: 8px;
      line-height: 1.5;
      font-size: 0.925rem;
      max-width: 90%;
      white-space: pre-wrap;
    }

    .message.user {
      background: #1d4ed8;
      align-self: flex-end;
    }

    .message.agent {
      background: #1e293b;
      border: 1px solid #334155;
      align-self: flex-start;
    }

    .message.error {
      background: #3b1a1a;
      border: 1px solid #7f1d1d;
      color: #fca5a5;
      align-self: flex-start;
    }

    .input-row {
      display: flex;
      gap: 0.5rem;
    }

    input[type="text"] {
      flex: 1;
      background: #0f1117;
      border: 1px solid #2d3148;
      color: #e2e8f0;
      border-radius: 6px;
      padding: 0.55rem 0.8rem;
      font-size: 0.925rem;
      outline: none;
    }

    input[type="text"]:focus {
      border-color: #7dd3fc;
    }

    button {
      background: #1d4ed8;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 0.55rem 1.1rem;
      font-size: 0.925rem;
      cursor: pointer;
      transition: background 0.15s;
    }

    button:hover { background: #2563eb; }
    button:disabled { background: #334155; cursor: not-allowed; }

    /* Ingest */
    .ingest-row {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
    }

    #ingest-status {
      font-size: 0.875rem;
      min-height: 1.25rem;
    }

    #ingest-status.success { color: #86efac; }
    #ingest-status.error   { color: #fca5a5; }

    /* Sources list */
    #sources-list {
      list-style: none;
      margin-top: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    #sources-list li {
      font-size: 0.875rem;
      color: #94a3b8;
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 6px;
      padding: 0.4rem 0.75rem;
      word-break: break-all;
    }

    #sources-empty {
      font-size: 0.875rem;
      color: #475569;
      margin-top: 0.75rem;
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    .card-header h2 { margin-bottom: 0; }

    button.danger {
      background: #7f1d1d;
      font-size: 0.8rem;
      padding: 0.4rem 0.8rem;
    }

    button.danger:hover { background: #991b1b; }

    /* Drop zone */
    .drop-zone {
      border: 2px dashed #2d3148;
      border-radius: 8px;
      padding: 1.25rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      margin-bottom: 0.75rem;
    }

    .drop-zone:hover,
    .drop-zone.drag-over {
      border-color: #7dd3fc;
      background: #151929;
    }

    .drop-zone p {
      color: #475569;
      font-size: 0.875rem;
      margin-bottom: 0.5rem;
    }

    .drop-zone .file-types {
      font-size: 0.775rem;
      color: #334155;
      margin-bottom: 0.6rem;
    }

    .drop-zone .browse-btn {
      background: transparent;
      border: 1px solid #2d3148;
      color: #94a3b8;
      font-size: 0.8rem;
      padding: 0.35rem 0.85rem;
    }

    .drop-zone .browse-btn:hover {
      border-color: #7dd3fc;
      color: #7dd3fc;
      background: transparent;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.75rem;
      color: #334155;
      font-size: 0.8rem;
    }

    .divider::before,
    .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: #2d3148;
    }
  </style>
</head>
<body>
  <h1>Homelab AI Agent</h1>

  <div class="container">

    <!-- Chat -->
    <div class="card">
      <h2>Ask a Question</h2>
      <div id="chat-log"></div>
      <div class="input-row">
        <input id="question-input" type="text" placeholder="Ask about your homelab docs..." />
        <button id="ask-btn" onclick="askQuestion()">Ask</button>
      </div>
    </div>

    <!-- Ingest -->
    <div class="card">
      <div class="card-header">
        <h2>Add Document</h2>
        <button class="danger" onclick="resetIndex()">Delete Index</button>
      </div>
      <!-- Drop zone — click anywhere or use Browse button to open file picker -->
      <div class="drop-zone" id="drop-zone">
        <p>Drag &amp; drop a file here</p>
        <p class="file-types">.md &nbsp;·&nbsp; .txt &nbsp;·&nbsp; .pdf &nbsp;·&nbsp; max 50 MB</p>
        <button class="browse-btn" id="browse-btn">Browse</button>
        <!-- Hidden input — accept attribute is a first-pass client-side filter,
             not a security boundary. Server validates independently. -->
        <input type="file" id="file-input" accept=".md,.txt,.pdf" style="display:none" />
      </div>

      <div class="divider">or enter a URL</div>

      <div class="ingest-row">
        <input id="source-input" type="text" placeholder="https://docs.example.com/setup" />
        <button id="ingest-btn" onclick="ingestDocument()">Add</button>
      </div>
      <div id="ingest-status"></div>
      <ul id="sources-list"></ul>
      <p id="sources-empty"></p>
    </div>

  </div>

  <script>
    const chatLog = document.getElementById("chat-log");

    function appendMessage(text, type) {
      const el = document.createElement("div");
      el.className = `message ${type}`;
      el.textContent = text;
      chatLog.appendChild(el);
      chatLog.scrollTop = chatLog.scrollHeight;
    }

    async function askQuestion() {
      const input = document.getElementById("question-input");
      const btn = document.getElementById("ask-btn");
      const question = input.value.trim();
      if (!question) return;

      appendMessage(question, "user");
      input.value = "";
      btn.disabled = true;

      try {
        const res = await fetch("/ask", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question })
        });
        const data = await res.json();
        if (data.error) {
          appendMessage(data.error, "error");
        } else {
          appendMessage(data.answer, "agent");
        }
      } catch (e) {
        appendMessage("Failed to reach the server.", "error");
      } finally {
        btn.disabled = false;
        input.focus();
      }
    }

    async function ingestDocument() {
      const input = document.getElementById("source-input");
      const btn = document.getElementById("ingest-btn");
      const status = document.getElementById("ingest-status");
      const source = input.value.trim();
      if (!source) return;

      btn.disabled = true;
      status.textContent = "Ingesting...";
      status.className = "";

      try {
        const res = await fetch("/ingest", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ source })
        });
        const data = await res.json();
        if (data.error) {
          status.textContent = data.error;
          status.className = "error";
        } else {
          status.textContent = data.message;
          status.className = data.failed && data.failed.length > 0 ? "error" : "success";
          input.value = "";
          loadSources();

          if (data.failed && data.failed.length > 0) {
            const failList = data.failed.map(f => `• ${f.source}: ${f.error}`).join("\n");
            status.textContent += `\n\nFailed:\n${failList}`;
          }
        }
      } catch (e) {
        status.textContent = "Failed to reach the server.";
        status.className = "error";
      } finally {
        btn.disabled = false;
      }
    }

    async function loadSources() {
      const list = document.getElementById("sources-list");
      const empty = document.getElementById("sources-empty");
      try {
        const res = await fetch("/sources");
        const data = await res.json();
        list.innerHTML = "";
        if (data.sources.length === 0) {
          empty.textContent = "No documents indexed yet.";
        } else {
          empty.textContent = "";
          data.sources.forEach(src => {
            const li = document.createElement("li");
            li.textContent = src;
            list.appendChild(li);
          });
        }
      } catch (e) {
        empty.textContent = "Failed to load sources.";
      }
    }

    async function resetIndex() {
      if (!confirm("Delete the entire index and start fresh?")) return;
      const status = document.getElementById("ingest-status");
      try {
        const res = await fetch("/reset", { method: "POST" });
        const data = await res.json();
        if (data.error) {
          status.textContent = data.error;
          status.className = "error";
        } else {
          status.textContent = data.message;
          status.className = "success";
          loadSources();
        }
      } catch (e) {
        status.textContent = "Failed to reach the server.";
        status.className = "error";
      }
    }

    document.getElementById("question-input").addEventListener("keydown", e => {
      if (e.key === "Enter") askQuestion();
    });

    document.getElementById("source-input").addEventListener("keydown", e => {
      if (e.key === "Enter") ingestDocument();
    });

    // ── File upload (drag-and-drop + Browse button) ──────────────────────────

    // Mirrors the server-side allowlist — client-side check fails fast before
    // a round trip, but is NOT the security boundary (server validates independently).
    const ALLOWED_EXTS = new Set([".md", ".txt", ".pdf"]);
    const MAX_BYTES = 50 * 1024 * 1024; // Must match MAX_CONTENT_LENGTH on the server

    function getExt(filename) {
      const idx = filename.lastIndexOf(".");
      return idx === -1 ? "" : filename.slice(idx).toLowerCase();
    }

    function clientValidate(file) {
      // Extension check — catch obvious rejections before touching the network
      if (!ALLOWED_EXTS.has(getExt(file.name))) {
        return `Unsupported file type: ${getExt(file.name)}. Allowed: .md, .txt, .pdf`;
      }
      // Size check — avoids sending a payload the server will reject via 413
      if (file.size > MAX_BYTES) {
        return `File too large (${(file.size / 1024 / 1024).toFixed(1)} MB). Max: 50 MB`;
      }
      return null;
    }

    async function uploadFile(file) {
      const status = document.getElementById("ingest-status");

      const err = clientValidate(file);
      if (err) {
        status.textContent = err;
        status.className = "error";
        return;
      }

      status.textContent = `Uploading ${file.name}...`;
      status.className = "";

      // FormData sends as multipart/form-data — file bytes only, no local path exposed
      const formData = new FormData();
      formData.append("file", file);

      try {
        const res = await fetch("/upload", { method: "POST", body: formData });
        const data = await res.json();
        if (data.error) {
          status.textContent = data.error;
          status.className = "error";
        } else {
          status.textContent = data.message;
          status.className = "success";
          loadSources();
        }
      } catch (e) {
        status.textContent = "Failed to reach the server.";
        status.className = "error";
      }
    }

    const dropZone = document.getElementById("drop-zone");
    const fileInput = document.getElementById("file-input");

    // Browse button and drop zone click both trigger the hidden file input
    document.getElementById("browse-btn").addEventListener("click", e => {
      e.stopPropagation(); // Prevent double-trigger from drop zone click listener
      fileInput.click();
    });

    dropZone.addEventListener("click", () => fileInput.click());

    fileInput.addEventListener("change", e => {
      if (e.target.files[0]) uploadFile(e.target.files[0]);
      e.target.value = ""; // Reset so the same file can be re-selected
    });

    dropZone.addEventListener("dragover", e => {
      e.preventDefault(); // Required — without this the drop event won't fire
      dropZone.classList.add("drag-over");
    });

    dropZone.addEventListener("dragleave", e => {
      // Only remove highlight when leaving the zone itself, not a child element
      if (!dropZone.contains(e.relatedTarget)) {
        dropZone.classList.remove("drag-over");
      }
    });

    dropZone.addEventListener("drop", e => {
      e.preventDefault();
      dropZone.classList.remove("drag-over");
      const file = e.dataTransfer.files[0];
      if (file) uploadFile(file);
    });

    loadSources();
  </script>
</body>
</html>
